<section id="contact" class="contact-section">
  <div class="contact-container">
    <div class="section-title">
      <span class="subtitle">Contact Us</span>
      <h2>Get In Touch</h2>
      <p>Ready to transform your communication skills? Contact us today!</p>
    </div>
    <div class="contact-grid">
      <div class="contact-info">
        <div class="info-card">
          <div class="info-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
          </div>
          <div class="info-content">
            <h4>Phone</h4>
            <a [href]="'tel:' + contactInfo.phone">{{ contactInfo.phone }}</a>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
          </div>
          <div class="info-content">
            <h4>Location</h4>
            <p>{{ contactInfo.address }}<br>{{ contactInfo.city }}</p>
          </div>
        </div>
        <div class="info-card">
          <div class="info-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </div>
          <div class="info-content">
            <h4>Class Timing</h4>
            <p>{{ contactInfo.timing }}</p>
          </div>
        </div>
      </div>
      <div class="contact-form-wrapper">
        <form (ngSubmit)="onSubmit()" class="contact-form">
          <h3>Send us a Message</h3>
          <div class="form-group">
            <input type="text" [(ngModel)]="formData.name" name="name" placeholder="Your Name" required>
          </div>
          <div class="form-group">
            <input type="tel" [(ngModel)]="formData.phone" name="phone" placeholder="Phone Number" required>
          </div>
          <div class="form-group">
            <textarea [(ngModel)]="formData.message" name="message" placeholder="Your Message" rows="4"></textarea>
          </div>
          <button type="submit" class="submit-btn">Send Message</button>
        </form>
      </div>
    </div>
  </div>
</section>
