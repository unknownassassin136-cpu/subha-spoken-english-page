<section id="testimonials" class="testimonials-section">
  <div class="testimonials-container">
    <div class="section-title">
      <span class="subtitle">Testimonials</span>
      <h2>What Our Students Say</h2>
      <p>Real stories from students who transformed their communication skills and achieved their career goals.</p>
    </div>
    
    <div class="rating-banner">
      <div class="rating-main">
        <div class="stars">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <span class="rating-text">5.0 Google Rating</span>
      </div>
      <span class="review-count">70+ Reviews</span>
    </div>
    
    <div class="testimonials-grid">
      <div class="testimonial-card" *ngFor="let t of testimonials">
        <div class="card-header">
          <div class="avatar">{{ t.name.charAt(0) }}</div>
          <div class="student-info">
            <h4>{{ t.name }}</h4>
            <span class="role">{{ t.role }}</span>
            <span class="location">{{ t.location }}</span>
          </div>
          <div class="rating">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="#D69E2E"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          </div>
        </div>
        <p class="testimonial-text">"{{ t.text }}"</p>
      </div>
    </div>
  </div>
</section>
